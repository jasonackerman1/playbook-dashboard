name: Update Onboarding Dashboard

on:
  push:
    paths:
      - 'onboarding-data/*.xlsx'
      - 'update_onboarding_dashboard.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate onboarding.html
        run: python update_onboarding_dashboard.py

      - name: Commit and push generated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add onboarding.html
          git diff --cached --quiet || git commit -m "Auto-update onboarding.html [skip ci]"
          git push
